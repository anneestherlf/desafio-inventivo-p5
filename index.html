
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Projeto: Comparação de Crédito</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background-color: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
        }
        .main-card {
            width: 440px; background-color: #e9ecef;
            border-radius: 40px; padding: 40px 30px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.15);
            text-align: center;
        }
        h1 { color: #1d2d44; font-size: 22px; margin-bottom: 30px; line-height: 1.3; }
        .inputs { display: flex; gap: 15px; margin-bottom: 20px; text-align: left; }
        .group { flex: 1; }
        label { display: block; font-size: 13px; color: #495057; margin-bottom: 8px; }
        input { 
            width: 100%; padding: 12px; border: none; 
            border-radius: 12px; font-size: 16px; box-sizing: border-box;
        }
        .actions { display: flex; gap: 15px; margin-bottom: 25px; }
        .btn { 
            flex: 1; padding: 15px; background-color: #415a77; 
            color: white; border: none; border-radius: 25px; 
            font-weight: 600; cursor: pointer; font-size: 16px;
        }
        .select-box { 
            flex: 1; position: relative; background: white; 
            border-radius: 25px; display: flex; align-items: center;
        }
        select { 
            width: 100%; padding: 12px 20px; border: none; 
            background: transparent; appearance: none; font-size: 16px;
        }
        .select-box::after { content: '⌄'; position: absolute; right: 20px; font-size: 18px; color: #666; }
        .chart-area { background-color: #dee2e6; border-radius: 25px; padding: 20px; }
        .diff { font-size: 18px; color: #495057; margin-bottom: 15px; }
        .diff span { color: #c0a060; font-weight: 600; }
        #p5-canvas { background: white; border-radius: 15px; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="main-card">
    <h1 id="title">Comparação de limite de crédito concedido</h1>
    
    <div class="inputs">
        <div class="group">
            <label>Modelo Não-Linear:</label>
            <input type="number" id="nlVal" value="50">
        </div>
        <div class="group">
            <label>Modelo Linear:</label>
            <input type="number" id="lVal" value="25">
        </div>
    </div>

    <div class="actions">
        <button class="btn" id="btnComparar">Comparar</button>
        <div class="select-box">
            <select id="selMonth" onchange="document.getElementById('title').innerText = 'Comparação de limite de crédito concedido em ' + this.value;">
                <option value="Janeiro">Janeiro</option>
                <option value="Fevereiro">Fevereiro</option>
                <option value="Março">Março</option>
                <option value="Abril" selected>Abril</option>
            </select>
        </div>
    </div>

    <div class="chart-area">
        <div class="diff">Diferença: <span id="diffText">+25 (média)</span></div>
        <div id="p5-canvas"></div>
    </div>
</div>

<script src="sketch.js"></script>
</body>
</html>
